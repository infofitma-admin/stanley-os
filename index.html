<div v-if="editingTask" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex justify-end">
    <div @click.self="editingTask = null" class="absolute inset-0"></div>
    <div class="w-full max-w-xl bg-white dark:bg-slate-900 h-full shadow-2xl relative flex flex-col animate-slide-left">
        <header class="p-8 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <select v-model="editingTask.company" class="bg-slate-100 dark:bg-slate-800 border-none text-[10px] font-black uppercase tracking-widest rounded-lg px-3 py-1.5">
                    <option>Dymek</option><option>GigaScan</option><option>Lading Technology</option>
                </select>
            </div>
            <button @click="editingTask = null" class="text-slate-400 hover:text-slate-900 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-8 space-y-8">
            <textarea v-model="editingTask.title" class="text-3xl font-display font-extrabold w-full bg-transparent border-none focus:ring-0 resize-none p-0" placeholder="Operation Title..." rows="2"></textarea>
            
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Status</label>
                    <select v-model="editingTask.status" class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-xl p-3 text-sm font-bold appearance-none">
                        <option v-for="c in columns" :key="c.id" :value="c.id" v-text="c.title"></option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Priority</label>
                    <select v-model="editingTask.priority" class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-xl p-3 text-sm font-bold">
                        <option>Urgent</option><option>High</option><option>Normal</option><option>Low</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Effort (Heatmap)</label>
                    <select v-model="editingTask.effort" class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-xl p-3 text-sm font-bold">
                        <option>High</option><option>Medium</option><option>Low</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Impact (Matrix)</label>
                    <select v-model="editingTask.impact" class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-xl p-3 text-sm font-bold">
                        <option>High</option><option>Medium</option><option>Low</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Assignee</label>
                    <input v-model="editingTask.assignee" class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-xl p-3 text-sm font-bold" placeholder="Who's responsible?">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Target Date</label>
                    <input type="date" v-model="editingTask.due_date" class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-xl p-3 text-sm font-bold">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Action roadmap</label>
                <textarea v-model="editingTask.action" class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl p-5 text-sm font-medium min-h-[200px]" placeholder="Detailed steps..."></textarea>
            </div>
        </div>

        <footer class="p-8 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center">
            <button @click="deleteTask" class="text-rose-500 text-[10px] font-black uppercase tracking-widest hover:opacity-70 transition-opacity">Delete</button>
            <button @click="saveTask" class="px-12 py-4 bg-brand text-white rounded-2xl text-xs font-black uppercase tracking-widest shadow-xl shadow-brand/20 hover:scale-[1.02] active:scale-95 transition-all">Save</button>
        </footer>
    </div>
</div>

<script>
const { createApp, ref, onMounted, computed, nextTick } = Vue;

// FIX: Renamed variable to sb to avoid collision with the global supabase object
const sb = supabase.createClient(
    'https://waeqcgpldlvtrglxfxjl.supabase.co', 
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndhZXFjZ3BsZGx2dHJnbHhmeGpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjY4NjYsImV4cCI6MjA5MjQ0Mjg2Nn0.y29VL88QCi_e01LVckzQzBdYzObYPDr49vCzAC2b5gg'
);

createApp({
    setup() {
        const tasks = ref([]);
        const activeTab = ref('All');
        const viewMode = ref('kanban');
        const editingTask = ref(null);
        const isDarkMode = ref(localStorage.getItem('fitma_dark_mode') === 'true');
        const searchQuery = ref('');

        const columns = ref([
            {id:'notstarted', title:'Not Started'}, 
            {id:'progress', title:'In Progress'}, 
            {id:'waiting', title:'Paused'}, 
            {id:'completed', title:'Completed'}
        ]);

        const fetchTasks = async () => {
            const { data, error } = await sb.from('tasks').select('*').order('created_at', { ascending: false });
            if (data) tasks.value = data;
            nextTick(initSortable);
        };

        // Real-time listener
        sb.channel('tasks_channel').on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => {
            fetchTasks();
        }).subscribe();

        const filteredTasks = (id) => {
            let filtered = tasks.value.filter(t => t.status === id);
            if (activeTab.value !== 'All') filtered = filtered.filter(t => t.company === activeTab.value);
            if (searchQuery.value) filtered = filtered.filter(t => t.title.toLowerCase().includes(searchQuery.value.toLowerCase()));
            return filtered;
        };

        const saveTask = async () => {
            if (!editingTask.value.title) return;
            const { error } = await sb.from('tasks').upsert(editingTask.value);
            if (!error) { 
                editingTask.value = null; 
                fetchTasks(); 
            }
        };

        const addTask = (statusId) => {
            editingTask.value = {
                title: '',
                company: activeTab.value === 'All' ? 'Dymek' : activeTab.value,
                status: statusId,
                priority: 'Normal',
                effort: 'Medium',
                impact: 'Medium',
                assignee: '',
                action: ''
            };
        };

        const deleteTask = async () => {
            if (confirm('Permanently delete this task?')) {
                await sb.from('tasks').delete().eq('id', editingTask.value.id);
                editingTask.value = null;
                fetchTasks();
            }
        };

        // Initialize Sortable with clean-up logic
        let sortables = [];
        const initSortable = () => {
            sortables.forEach(s => s.destroy());
            sortables = [];
            columns.value.forEach(col => {
                const el = document.getElementById('kanban-' + col.id);
                if (el) {
                    const s = new Sortable(el, {
                        group: 'tasks',
                        animation: 150,
                        onEnd: async (evt) => {
                            const taskId = evt.item.dataset.id;
                            const newStatus = evt.to.dataset.status;
                            await sb.from('tasks').update({ status: newStatus }).eq('id', taskId);
                        }
                    });
                    sortables.push(s);
                }
            });
        };

        onMounted(() => {
            fetchTasks();
            if (isDarkMode.value) document.documentElement.classList.add('dark');
        });

        return {
            tasks, activeTab, viewMode, editingTask, columns, isDarkMode, searchQuery, 
            filteredTasks, saveTask, addTask, deleteTask, openTask: (t) => editingTask.value = { ...t }
        };
    }
}).mount('#app');
</script>
